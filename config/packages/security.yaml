security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        admin_user:
            memory:
                users:
                    admin:
                        password: '%env(ADMIN_PASSWORD_HASH)%'
                        roles: ['ROLE_ADMIN']

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false
        admin:
            pattern: ^/admin
            lazy: true
            provider: admin_user
            form_login:
                login_path: admin_login
                check_path: admin_login
                default_target_path: admin
                enable_csrf: true
            logout:
                path: admin_logout
                target: admin_login
            # Anti brute-force : 5 tentatives échouées par IP+username / 15 min
            login_throttling:
                max_attempts: 5
                interval: '15 minutes'
        main:
            lazy: true
            provider: admin_user

    access_control:
        - { path: ^/admin/login, roles: PUBLIC_ACCESS }
        - { path: ^/admin, roles: ROLE_ADMIN }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
