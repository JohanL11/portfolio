    intro: "Le seul traitement impliquant un transfert de données vers les États-Unis est :"
    resend: "<strong>Resend</strong> (envoi e-mail) — encadré par les Clauses Contractuelles Types de la Commission européenne."
    fonts_self_hosted: "Les polices d'écriture (Inter, JetBrains Mono) sont <strong>auto-hébergées</strong> sur le serveur — aucun appel à un service tiers (Google Fonts ou autre) n'est effectué."
  cookies:
    title: "Cookies et stockage local"
    intro: "Le site n'utilise <strong>aucun cookie de mesure d'audience ni de publicité</strong>. Les seuls éléments stockés sur votre navigateur sont strictement nécessaires au fonctionnement du site et exemptés de consentement (article 82 de la loi Informatique et Libertés) :"
    session: "<strong>Cookie de session Symfony</strong> — identifiant temporaire requis par le framework, supprimé à la fermeture du navigateur."
    csrf: "<strong>Jeton CSRF</strong> — protection contre les attaques par falsification de requête."
    locale: "<strong>Préférence de langue</strong> — mémorise votre choix entre français et anglais."
    theme: "<strong>Préférence de thème (localStorage)</strong> — mémorise votre choix clair / sombre. Stocké localement sur votre appareil, jamais transmis."
  rights:
    title: "Vos droits"
    intro: "Conformément aux articles 15 à 22 du RGPD, vous disposez des droits suivants sur vos données :"
    access: "<strong>Droit d'accès</strong> — obtenir confirmation que vos données sont traitées et en recevoir une copie"
    rectification: "<strong>Droit de rectification</strong> — corriger des données inexactes"
    erasure: "<strong>Droit à l'effacement</strong> (« droit à l'oubli ») — demander la suppression de vos données"
    restriction: "<strong>Droit à la limitation du traitement</strong>"
    opposition: "<strong>Droit d'opposition</strong> — vous opposer au traitement pour motif légitime"
    portability: "<strong>Droit à la portabilité</strong> — recevoir vos données dans un format structuré"
  exercise:
    title: "Exercer vos droits"
    text: "Pour exercer l'un de ces droits, envoyez un e-mail à <strong>louap.johan@outlook.fr</strong> en précisant votre demande et un moyen de vous identifier. Une réponse vous sera apportée dans un délai maximum d'un mois."
  complaint:
    title: "Réclamation auprès de la CNIL"
    text: "Si vous estimez que le traitement de vos données ne respecte pas la réglementation, vous avez le droit d'introduire une réclamation auprès de la Commission Nationale de l'Informatique et des Libertés (CNIL) — <a href=\"https://www.cnil.fr/fr/plaintes\" target=\"_blank\" rel=\"noopener\">cnil.fr/fr/plaintes</a>."
  updates:
    title: "Modifications de la politique"
    text: "Cette politique peut être mise à jour pour refléter les évolutions du site ou de la réglementation. La date de dernière mise à jour est indiquée en haut de cette page. Les modifications substantielles seront signalées de manière apparente."
