  web:
    label: "Prestation 2"
    title: "Site vitrine & application web"
    lead: "De la carte de visite en ligne à l'application web métier complexe — je conçois des interfaces performantes, bien référencées et agréables à utiliser."
    included: "Ce qui est inclus"
    item:
      "1": "Design responsive, mobile-first"
      "2": "SEO optimisé dès la conception"
      "3": "Formulaire de contact sécurisé"
      "4": "Interface d'administration (si nécessaire)"
      "5": "API REST sur-mesure pour vos besoins métier"
      "6": "Authentification & gestion des rôles"
      "7": "Hébergement, SSL & déploiement continu"
      "8": "Maintenance & évolutions facilitées"
    seo_tooltip: "Référencement naturel — optimisation pour apparaître en bonne position sur Google et autres moteurs de recherche."
