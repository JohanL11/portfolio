      title: "Site vitrine — Symfony/Twig"
      text: "Rendu côté serveur, SEO natif, performances excellentes. Idéal pour les sites vitrines, portfolios, blogs ou sites institutionnels."
    react:
      title: "Application web — Symfony API + React"
      text: "Interface très interactive (SPA), expérience utilisateur fluide, code réutilisable côté mobile. Idéal pour les outils métier et dashboards."
    cta: "Discutons de votre site →"
  mobile:
    label: "Prestation 3"
    title: "Application mobile"
    lead: "Votre idée dans la poche de vos utilisateurs. Une application iOS & Android depuis une seule codebase React Native, publiée sur l'App Store et le Google Play."
    included: "Ce qui est inclus"
    item:
      "1": "Application iOS & Android (React Native)"
      "2": "Authentification & gestion des profils"
      "3": "Notifications push"
      "4": "API REST PHP dédiée"
      "5": "Synchronisation hors-ligne si nécessaire"
      "6": "Publication sur l'App Store & Google Play"
      "7": "Mises à jour facilitées (une seule application)"
    rn:
      title: "Pourquoi React Native ?"
      text: "Contrairement au développement natif (Swift pour iOS, Kotlin pour Android) qui nécessite deux codebases séparées, React Native permet de produire <strong>une seule application</strong> qui tourne nativement sur les deux plateformes. Résultat : coût réduit, maintenance simplifiée, performances proches du natif."
    cta: "Discutons de votre application →"
  process:
    tag: "Comment ça se passe"
    title: "Mon process de travail"
    subtitle: "Transparent, itératif et orienté résultat."
    step:
      "1":
        num: "01"
        title: "Discussion"
        text: "On échange sur votre besoin, vos contraintes, votre budget et vos délais. Appel, visio ou email — comme vous préférez."
      "2":
        num: "02"
        title: "Proposition"
        text: "Devis détaillé, planning de développement, choix techniques argumentés. Aucune surprise."
      "3":
        num: "03"
        title: "Développement"
        text: "Développement itératif avec points réguliers. Accès à un environnement de recette pour valider chaque étape."
      "4":
        num: "04"
        title: "Livraison"
        text: "Mise en production, tests finaux, formation à l'outil si besoin, et documentation. Le projet vous appartient."
  cta:
    tag: "Démarrons"
    title: "Un projet en tête ?"
    text: "Parlez-moi de votre idée — je vous réponds sous 24h avec une première estimation."
    btn: "Me contacter"

