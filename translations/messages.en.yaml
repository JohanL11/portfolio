      "3":
        num: "03"
        title: "Development"
        text: "Iterative development with regular check-ins. Access to a staging environment to validate each step."
      "4":
        num: "04"
        title: "Delivery"
        text: "Production deployment, final tests, tool training if needed, and documentation. The project is yours."
