    web: "🌐 Web"
    mobile: "📱 Mobile"
  ecommerce:
    label: "Service 1"
    title: "E-commerce store"
    lead: "A complete store designed to convert. From product catalogue to secure payment, I build your e-commerce in custom Symfony or via Shopify depending on your budget and needs."
    included: "What's included"
    item:
      "1": "Product catalogue, variants, stock management"
      "2": "Cart & optimised checkout flow"
      "3": "Secure payment — Stripe & PayPal"
      "4": "Customer portal & order history"
      "5": "Admin interface"
      "6": "Technical SEO & performance optimisation"
      "7": "Mobile-first responsive"
      "8": "Deployment on your server or dedicated hosting"
    stripe_tooltip: "Most widely used pro solution: card payments directly on your site, 3D Secure, refunds"
    paypal_tooltip: "Familiar to the general public: ideal for customers who prefer not to enter their card. Both solutions complement each other."
    seo_tooltip: "Search engine optimisation — ranking well on Google and other search engines."
    custom:
      title: "Custom (Symfony stack)"
      text: "100% tailored store, maximum performance, no third-party ecosystem dependency. Ideal for specific requirements."
    shopify:
      title: "Shopify integration"
      text: "Custom theme and features on the Shopify ecosystem. Fast time-to-market, Shopify back-office, App Store available."
    cta: "Let's discuss your store →"
  web:
    label: "Service 2"
    title: "Website & web application"
    lead: "From an online business card to a complex business web app — I build high-performance, well-ranked, enjoyable interfaces."
    included: "What's included"
    item:
      "1": "Responsive, mobile-first design"
      "2": "SEO optimised from the start"
      "3": "Secure contact form"
      "4": "Admin interface (if needed)"
      "5": "Custom REST API for your business needs"
      "6": "Authentication & role management"
      "7": "Hosting, SSL & continuous deployment"
      "8": "Maintenance & easy updates"
    seo_tooltip: "Search engine optimisation — ranking well on Google and other search engines."
    symfony:
      title: "Showcase site — Symfony/Twig"
      text: "Server-side rendering, native SEO, excellent performance. Ideal for showcase sites, portfolios, blogs or institutional sites."
    react:
      title: "Web app — Symfony API + React"
      text: "Highly interactive (SPA), smooth user experience, code reusable on mobile. Ideal for business tools and dashboards."
    cta: "Let's discuss your site →"
  mobile:
    label: "Service 3"
    title: "Mobile application"
    lead: "Your idea in your users' pockets. An iOS & Android app from a single React Native codebase, published on the App Store and Google Play."
    included: "What's included"
    item:
      "1": "iOS & Android app (React Native)"
      "2": "Authentication & profile management"
      "3": "Push notifications"
      "4": "Dedicated PHP REST API"
      "5": "Offline sync if needed"
      "6": "Published on App Store & Google Play"
      "7": "Easy updates (single codebase)"
    rn:
      title: "Why React Native?"
      text: "Unlike native development (Swift for iOS, Kotlin for Android) which requires two separate codebases, React Native produces <strong>a single application</strong> that runs natively on both platforms. Result: reduced cost, simplified maintenance, near-native performance."
    cta: "Let's discuss your app →"
