<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#13162a"/>
      <stop offset="100%" stop-color="#0b0f1a"/>
    </linearGradient>
    <linearGradient id="jl" x1="0.15" y1="0.12" x2="0.88" y2="0.88">
      <stop offset="0%" stop-color="#c7d2fe"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="22" fill="url(#bg)"/>
  <!-- J : crossbar gauche + vertical partagé + crochet gauche -->
  <path d="M 17 14 L 53 14 L 53 71 Q 53 86 27 86"
        stroke="url(#jl)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <!-- L : même vertical partagé (x=53) + pied droit -->
  <path d="M 53 14 L 53 86 L 87 86"
        stroke="url(#jl)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
</svg>
